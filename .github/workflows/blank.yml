name: MSBuild

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      # Point this to the subfolder
      [cite_start]run: nuget restore usermode/cormem_test.sln [cite: 1]

    - name: Build solution
      # Ensure the path starts with the folder name
      [cite_start]run: msbuild usermode/cormem_test.sln /p:Configuration=Release /p:Platform=x64 [cite: 1]
